<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tabernacle Amour Pour Le Calvaire</title>
    <link rel="stylesheet" href="css/admin-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <img src="images/main logo withe BG.png" alt="Church Logo" class="login-logo">
            <h1>Church Management System</h1>
            <p>Admin Back Office</p>
        </div>

        <div class="login-card">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <p class="login-subtitle">Enter your credentials to access the system</p>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-key"></i> Password
                    </label>
                    <div class="password-input">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="department">
                        <i class="fas fa-building"></i> Department
                    </label>
                    <select id="department" name="department" required>
                        <option value="">Select your department</option>
                        <option value="admin">Administration</option>
                        <option value="finance">Finance</option>
                        <option value="events">Events Management</option>
                        <option value="communications">Communications</option>
                        <option value="facilities">Facilities</option>
                        <option value="ministries">Ministries</option>
                        <option value="pastor">Pastoral Team</option>
                    </select>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>

                <div class="login-help">
                    <a href="#" onclick="forgotPassword()">
                        <i class="fas fa-question-circle"></i> Forgot password?
                    </a>
                </div>
            </form>

            <div id="loginMessage" class="login-message"></div>
        </div>

        <div class="login-footer">
            <p>&copy; 2026 Tabernacle Amour Pour Le Calvaire. All rights reserved.</p>
            <p class="demo-info">
                <i class="fas fa-info-circle"></i> Demo Mode: Use any username/password to login
            </p>
        </div>
    </div>

    <script src="js/admin-auth.js"></script>
</body>
</html>
